{% extends "base.html" %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <img src="{{ url_for('static', filename='logo_blanc.png') }}" alt="statimusic" height="36" class="auth-logo">
        <h1>Mot de passe oublié</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <p class="flash-{{ category }}">{{ message }}</p>
            {% endfor %}
        {% endwith %}
        <form method="POST" class="auth-form">
            <input type="email" name="email" placeholder="Email" required>
            <button type="submit" class="btn-primary">Envoyer le lien</button>
        </form>
        <p class="auth-switch"><a href="{{ url_for('auth.login') }}">← Retour à la connexion</a></p>
    </div>
</div>
{% endblock %}
